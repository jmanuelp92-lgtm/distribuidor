<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #3498db; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        
        .botones-accion { display: flex; gap: 10px; }
        .btn-excel { background: #27ae60; }
        
        .acciones-td { display: flex; gap: 5px; }
        .btn-editar { background: #f39c12; padding: 6px; margin: 0; width: auto; font-size: 12px;}
        .btn-borrar { background: #e74c3c; padding: 6px; margin: 0; width: auto; font-size: 12px;}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="card">
        <button onclick="location.href='menu.html'" style="background:#95a5a6; width:auto; padding: 8px 15px;">⬅ Volver</button>
        <h2>🍎 Gestión de Productos</h2>
        
        <input type="text" id="pNombre" placeholder="Nombre del Producto">
        <input type="number" id="pPrecio" placeholder="Precio de Venta">
        
        <div class="botones-accion">
            <button id="btnGuardar">Guardar Producto</button>
            <button id="btnImportar" class="btn-excel" title="El Excel debe tener columnas: Nombre y Precio">📥 Importar Excel</button>
        </div>
        
        <input type="file" id="fileExcel" accept=".xlsx, .xls" style="display: none;">

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="listaProds"></tbody>
        </table>
    </div>

    <script type="module">
        // IMPORTANTE: Agregamos query, orderByChild y equalTo para hacer la búsqueda
        import { db, ref, push, onValue, get, update, remove, query, orderByChild, equalTo } from './firebase.js';

        const nit = localStorage.getItem('userNit');
        if (!nit) {
            alert("Error: No se detectó el NIT de la empresa.");
            window.location.href = "index.html";
        }

        const btnGuardar = document.getElementById('btnGuardar');
        const btnImportar = document.getElementById('btnImportar');
        const fileExcel = document.getElementById('fileExcel');
        const inputNombre = document.getElementById('pNombre');
        const inputPrecio = document.getElementById('pPrecio');

        let idProductoEditando = null;

        // --- GUARDAR O ACTUALIZAR PRODUCTO ---
        btnGuardar.onclick = async () => {
            const nombre = inputNombre.value.trim();
            const precio = inputPrecio.value;

            if (!nombre || !precio) return alert("⚠️ Por favor llena el nombre y el precio.");

            try {
                const nombreNormalizado = nombre.toLowerCase();
                const snap = await get(ref(db, `companies/${nit}/productos`));
                let existeDuplicado = false;

                if (snap.exists()) {
                    const productos = snap.val();
                    for (const id in productos) {
                        if (id !== idProductoEditando && productos[id].nombre.toLowerCase() === nombreNormalizado) {
                            existeDuplicado = true;
                            break;
                        }
                    }
                }

                if (existeDuplicado) return alert(`❌ El producto "${nombre}" ya existe en la base de datos.`);

                if (idProductoEditando) {
                    await update(ref(db, `companies/${nit}/productos/${idProductoEditando}`), {
                        nombre: nombre,
                        precio: parseFloat(precio)
                    });
                    alert("✅ Producto actualizado exitosamente.");
                    idProductoEditando = null;
                    btnGuardar.textContent = "Guardar Producto";
                    btnGuardar.style.background = "#3498db";
                } else {
                    await push(ref(db, `companies/${nit}/productos`), {
                        nombre: nombre,
                        precio: parseFloat(precio)
                    });
                    alert("✅ Producto guardado: " + nombre);
                }

                inputNombre.value = "";
                inputPrecio.value = "";
            } catch (error) {
                alert("❌ Error: " + error.message);
            }
        };

        // --- IMPORTAR DESDE EXCEL ---
        btnImportar.onclick = () => fileExcel.click();

        fileExcel.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = window.XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = window.XLSX.utils.sheet_to_json(worksheet);
                    
                    if (jsonData.length === 0) return alert("⚠️ El archivo Excel está vacío.");

                    const snap = await get(ref(db, `companies/${nit}/productos`));
                    const nombresExistentes = new Set();
                    if (snap.exists()) {
                        Object.values(snap.val()).forEach(p => nombresExistentes.add(p.nombre.toLowerCase()));
                    }

                    let importados = 0, omitidos = 0;

                    for (const fila of jsonData) {
                        const nombreRaw = fila.Nombre || fila.nombre || fila.Producto || fila.producto;
                        const precioRaw = fila.Precio || fila.precio || fila.Valor || fila.valor;

                        if (nombreRaw && precioRaw) {
                            const nombreLimpio = String(nombreRaw).trim();
                            const nombreLower = nombreLimpio.toLowerCase();

                            if (!nombresExistentes.has(nombreLower)) {
                                await push(ref(db, `companies/${nit}/productos`), {
                                    nombre: nombreLimpio,
                                    precio: parseFloat(precioRaw)
                                });
                                nombresExistentes.add(nombreLower);
                                importados++;
                            } else {
                                omitidos++;
                            }
                        }
                    }
                    alert(`✅ Importación finalizada.\n\n✔️ Agregados: ${importados}\n❌ Omitidos por repetidos: ${omitidos}`);
                    fileExcel.value = ""; 

                } catch (error) {
                    alert("❌ Error al procesar el Excel: " + error.message);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // --- CARGAR LISTA ---
        onValue(ref(db, `companies/${nit}/productos`), snap => {
            const tbody = document.getElementById('listaProds');
            tbody.innerHTML = "";
            if (snap.exists()) {
                const productos = snap.val();
                for (const id in productos) {
                    const p = productos[id];
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.nombre}</td>
                            <td>$${p.precio}</td>
                            <td class="acciones-td">
                                <button class="btn-editar" onclick="prepararEdicion('${id}', '${p.nombre.replace(/'/g, "\\'")}', ${p.precio})">✏️ Editar</button>
                                <button class="btn-borrar" onclick="eliminarProducto('${id}', '${p.nombre.replace(/'/g, "\\'")}')">🗑️ Borrar</button>
                            </td>
                        </tr>`;
                }
            } else {
                tbody.innerHTML = "<tr><td colspan='3'>No hay productos registrados.</td></tr>";
            }
        });

        window.prepararEdicion = (id, nombre, precio) => {
            inputNombre.value = nombre;
            inputPrecio.value = precio;
            idProductoEditando = id;
            btnGuardar.textContent = "Actualizar Producto";
            btnGuardar.style.background = "#f39c12"; 
            inputNombre.focus(); 
        };

        // --- ELIMINAR CON VERIFICACIÓN DE MOVIMIENTOS ---
        window.eliminarProducto = async (id, nombre) => {
            try {
                // 1. Buscamos si existe al menos un movimiento con este ID de producto
                const movimientosRef = ref(db, `companies/${nit}/movimientos`);
                const q = query(movimientosRef, orderByChild('productoId'), equalTo(id));
                const snapMovimientos = await get(q);

                // Si 'snapMovimientos.exists()' es true, significa que tiene historial
                if (snapMovimientos.exists()) {
                    alert(`⚠️ Acción denegada: No se puede borrar "${nombre}" porque ya tiene movimientos (ventas, entradas, etc.) registrados en el sistema.`);
                    return; // Detiene la función aquí, no borra nada.
                }

                // 2. Si pasa la validación anterior, pedimos confirmación normal
                if (confirm(`¿Estás seguro de que deseas eliminar "${nombre}" de forma permanente?`)) {
                    await remove(ref(db, `companies/${nit}/productos/${id}`));
                    
                    if (idProductoEditando === id) {
                        idProductoEditando = null;
                        inputNombre.value = "";
                        inputPrecio.value = "";
                        btnGuardar.textContent = "Guardar Producto";
                        btnGuardar.style.background = "#3498db";
                    }
                }
            } catch (error) {
                console.error(error);
                alert("❌ Error al verificar o eliminar: " + error.message);
            }
        };
    </script>
</body>
</html>
